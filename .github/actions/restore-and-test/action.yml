name: Restore and test
description: Bootstrap pslrm, restore locked development dependencies, and execute the full test suite.

inputs:
  shell:
    description: Shell used to execute restore and test commands.
    required: true
  disable-coverage:
    description: Whether to disable code coverage collection.
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Install modules from PSGallery
      shell: ${{ inputs.shell }}
      env:
        SHELL: ${{ inputs.shell }}
      run: |
        ./scripts/Initialize-PSResourceRepository.ps1 -Shell $env:SHELL -InstallPslrm
        Restore-PSLResource

    - name: Execute all tests through Invoke-Build
      shell: ${{ inputs.shell }}
      env:
        DISABLE_COVERAGE: ${{ inputs.disable-coverage }}
      run: |
        $params = @{
            Tasks = 'TestAll'
        }
        if ($env:DISABLE_COVERAGE -eq 'true') {
            $params['DisableCoverage'] = $true
        }

        & ./.build.ps1 @params
